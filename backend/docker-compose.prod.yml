services:
  backend:
    image: zfogg/sidechain-backend:latest
    container_name: sidechain-backend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GOMEMLIMIT: "${GOMEMLIMIT:-1500MiB}"
        BUILD_PARALLELISM: "${BUILD_PARALLELISM:-2}"
    restart: unless-stopped
    pull_policy: never
    cpus: 1.5
    mem_limit: 1g
    memswap_limit: 1g
    env_file: ./.env
    command: ["./server"]
    environment:
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL:-http://elasticsearch:9200}
      - AUDIO_ANALYSIS_URL=${AUDIO_ANALYSIS_URL:-http://audio-analysis:8090}
      # Production Environment Configuration
      - GF_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-CHANGE_IN_PRODUCTION}
      - GF_SERVER_ROOT_URL=${GF_SERVER_ROOT_URL:-https://grafana.sidechain.live/}

      - GF_SMTP_ENABLED=${GF_SMTP_ENABLED:-false}
      - GF_SMTP_HOST=${GF_SMTP_HOST:-smtp.example.com}
      - GF_SMTP_PORT=${GF_SMTP_PORT:-587}
      - GF_SMTP_USER=${GF_SMTP_USER:-alerts@sidechain.live}
      - GF_SMTP_PASSWORD=${GF_SMTP_PASSWORD:-CHANGE_IN_PRODUCTION}
      - GF_SMTP_FROM_ADDRESS=${GF_SMTP_FROM_ADDRESS:-alerts@sidechain.live}

      - POSTGRES_USER=${POSTGRES_USER:-sidechain}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-CHANGE_IN_PRODUCTION}
      - POSTGRES_DB=${POSTGRES_DB:-sidechain}
      - DATABASE_URL=${DATABASE_URL:-postgres://sidechain:PASSWORD_HERE@postgres:5432/sidechain_prod?sslmode=require}

      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-CHANGE_IN_PRODUCTION}

      - ENVIRONMENT=${ENVIRONMENT:-production}
      - PORT=${PORT:-8787}
      - HOST=${HOST:-0.0.0.0}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FILE=${LOG_FILE:-/var/log/sidechain/server.log}

      - JWT_SECRET=${JWT_SECRET:-GENERATE_SECURE_JWT_SECRET_HERE}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://sidechain.live,https://www.sidechain.live}

      - STREAM_API_KEY=${STREAM_API_KEY:-CHANGEME}
      - STREAM_API_SECRET=${STREAM_API_SECRET:-CHANGEME_SECRET}

      - GORSE_URL=${GORSE_URL:-http://gorse:8088}
      - GORSE_API_KEY=${GORSE_API_KEY:-sidechain_gorse_api_key}

      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-s3}
      - AWS_REGION=${AWS_REGION:-us-west-2}
      - AWS_BUCKET=${AWS_BUCKET:-sidechain-prod-media}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-AKIAIOSFODNN7EXAMPLE}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY}
      - CDN_BASE_URL=${CDN_BASE_URL:-https://cdn.sidechain.live}

      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-123456}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-hunter2}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID:-123456}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET:-hunter2}
      - OAUTH_REDIRECT_URL=${OAUTH_REDIRECT_URL:-https://sidechain.live/auth/callback}

      - SES_FROM_EMAIL=${SES_FROM_EMAIL:-noreply@sidechain.live}
      - SES_FROM_NAME=${SES_FROM_NAME:-Sidechain}
      - BASE_URL=${BASE_URL:-https://sidechain.live}

    depends_on:
      postgres:
        condition: service_healthy
      gorse:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      audio-analysis:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:8787/health || exit 1",
        ]
      interval: 5s
      timeout: 2s
      retries: 7
      start_period: 3s

    networks:
      - sidechain

  audio-analysis:
    image: zfogg/sidechain-audio-analysis:latest
    container_name: sidechain-audio-analysis
    build:
      context: ./services/audio-analysis
      dockerfile: Dockerfile
    restart: unless-stopped
    cpus: 2.0
    mem_limit: 1g
    memswap_limit: 1g
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MAX_AUDIO_DURATION=${MAX_AUDIO_DURATION:-300}
      - ANALYSIS_TIMEOUT=${ANALYSIS_TIMEOUT:-60}
    volumes:
      - audio_analysis_tmp:/tmp/audio-analysis
      - essentia_models:/app/models
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8090/health || exit 1"]
      interval: 3s
      timeout: 2s
      retries: 7
      start_period: 4s
    networks:
      - sidechain

  postgres:
    image: postgres:16-alpine
    container_name: sidechain-postgres
    restart: unless-stopped
    cpus: 0.75
    mem_limit: 512m
    memswap_limit: 512m
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-sidechain}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-sidechain_dev_password}"
      POSTGRES_DB: "${POSTGRES_DB:-sidechain}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sidechain"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sidechain

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: sidechain-elasticsearch
    restart: unless-stopped
    cpus: 1.0
    mem_limit: 2g
    memswap_limit: 2g
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - bootstrap.memory_lock=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 7
      start_period: 5s
    networks:
      - sidechain

  gorse:
    image: zfogg/sidechain-gorse:latest
    build:
      context: .
      dockerfile: Dockerfile.gorse
    container_name: sidechain-gorse
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 256m
    memswap_limit: 256m
    environment:
      # Database connection
      POSTGRES_USER: "${POSTGRES_USER:-sidechain}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-sidechain_dev_password}"
      POSTGRES_HOST: "${POSTGRES_HOST:-postgres}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      POSTGRES_GORSE_DB: "${POSTGRES_GORSE_DB:-gorse}"
      # Redis connection
      REDIS_URL: "${REDIS_URL:-redis://redis:6379}"
      # Gorse API key
      GORSE_API_KEY: "${GORSE_API_KEY:-sidechain_gorse_api_key}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "timeout 1 bash -c '</dev/tcp/localhost/8088' 2>/dev/null",
        ]
      interval: 3s
      timeout: 2s
      retries: 7
      start_period: 2s
    networks:
      - sidechain

  redis:
    image: redis/redis-stack-server:latest
    container_name: sidechain-redis
    restart: unless-stopped
    cpus: 0.25
    mem_limit: 256m
    memswap_limit: 256m
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 7
    networks:
      - sidechain

  prometheus:
    image: zfogg/sidechain-prometheus:latest
    build:
      context: .
      dockerfile: Dockerfile.prometheus
    container_name: sidechain-prometheus
    restart: unless-stopped
    cpus: 0.25
    mem_limit: 128m
    memswap_limit: 128m
    expose:
      - "9090"
    volumes:
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:9090/-/healthy",
        ]
      interval: 3s
      timeout: 2s
      retries: 8
    networks:
      - sidechain

  grafana:
    image: grafana/grafana:latest
    container_name: sidechain-grafana
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 512m
    memswap_limit: 512m
    expose:
      - "3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: "lax"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-https://grafana.sidechain.live/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SMTP_ENABLED: ${GF_SMTP_ENABLED:-false}
      GF_SMTP_HOST: ${GF_SMTP_HOST}
      GF_SMTP_PORT: ${GF_SMTP_PORT:-587}
      GF_SMTP_USER: ${GF_SMTP_USER}
      GF_SMTP_PASSWORD: ${GF_SMTP_PASSWORD}
      GF_SMTP_FROM_ADDRESS: ${GF_SMTP_FROM_ADDRESS}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      interval: 3s
      timeout: 2s
      retries: 8
    networks:
      - sidechain

volumes:
  postgres_data:
    driver: local
  elasticsearch_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  audio_analysis_tmp:
    driver: local
  essentia_models:
    driver: local

networks:
  sidechain:
    driver: bridge
